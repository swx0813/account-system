    <script>
window.errorLog = [];
window.warningLog = [];
window.MAX_LOG_ITEMS = 100;

function addError(error) {
    if (window.errorLog.length >= window.MAX_LOG_ITEMS) {
        window.errorLog.shift();
    }
    window.errorLog.push(error);
    requestAnimationFrame(updateErrorDisplay);
}

function addWarning(warning) {
    if (window.warningLog.length >= window.MAX_LOG_ITEMS) {
        window.warningLog.shift();
    }
    window.warningLog.push(warning);
    requestAnimationFrame(updateWarningDisplay);
}

function updateErrorDisplay() {
    const counter = document.getElementById('errorCount');
    const counterBox = document.getElementById('errorCounter');
    if (counter && counterBox) {
        const count = window.errorLog.length;
        counter.textContent = count;
        if (count > 0) {
            counterBox.style.background = '#fee2e2';
            counterBox.style.color = '#dc2626';
        } else {
            counterBox.style.background = '#f3f4f6';
            counterBox.style.color = '#6b7280';
        }
    }
}

function updateWarningDisplay() {
    const counter = document.getElementById('warningCount');
    const counterBox = document.getElementById('warningCounter');
    if (counter && counterBox) {
        const count = window.warningLog.length;
        counter.textContent = count;
        if (count > 0) {
            counterBox.style.background = '#FEF6D5';
            counterBox.style.color = '#92400e';
        } else {
            counterBox.style.background = '#f3f4f6';
            counterBox.style.color = '#6b7280';
        }
    }
}

window.onerror = function(msg, url, lineNo, columnNo, error) {
    addError({
        type: '全局错误',
        message: msg,
        source: url + ':' + lineNo + ':' + columnNo,
        stack: error?.stack || '',
        time: new Date().toLocaleString('zh-CN')
    });
    return false;
};

window.addEventListener('unhandledrejection', function(event) {
    addError({
        type: 'Promise错误',
        message: event.reason?.message || String(event.reason),
        source: event.reason?.stack || '',
        stack: '',
        time: new Date().toLocaleString('zh-CN')
    });
});

window.addEventListener('error', function(event) {
    if (event.target && (event.target.tagName === 'IMG' || event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
        addError({
            type: '资源加载错误',
            message: event.target.tagName + ' 加载失败: ' + (event.target.src || event.target.href),
            source: '',
            stack: '',
            time: new Date().toLocaleString('zh-CN')
        });
    }
}, true);

function applyConsoleOverrides() {
    if (window._consoleOverridden) return;
    window._consoleOverridden = true;
    
    window._originalConsoleError = console.error;
    console.error = function(...args) {
        window._originalConsoleError.apply(console, args);
        const errorMsg = args.map(arg => {
            if (typeof arg === 'object') {
                try { return JSON.stringify(arg); }
                catch(e) { return String(arg); }
            }
            return String(arg);
        }).join(' ');
        if (!errorMsg.includes('talwindcss') && 
                !errorMsg.includes('Invalid API key') && 
                !errorMsg.includes('Invalid login credentials') &&
                !errorMsg.includes('Email not confirmed') &&
                !errorMsg.includes('User not found')) {
                addError({
                    type: 'Console错误',
                    message: errorMsg,
                    source: '',
                    stack: '',
                    time: new Date().toLocaleString('zh-CN')
                });
            }
    };
    
    window._originalConsoleWarn = console.warn;
    console.warn = function(...args) {
        window._originalConsoleWarn.apply(console, args);
        const warnMsg = args.map(arg => {
            if (typeof arg === 'object') {
                try { return JSON.stringify(arg); }
                catch(e) { return String(arg); }
            }
            return String(arg);
        }).join(' ');
        if (!warnMsg.includes('talwindcss') && 
            !warnMsg.includes('swal2') &&
            !warnMsg.includes('Multiple GoTrueClient')) {
            addWarning({
                type: 'Console警告',
                message: warnMsg,
                source: '',
                stack: '',
                time: new Date().toLocaleString('zh-CN')
            });
        }
    };
}

function applyFetchOverride() {
    if (window._fetchOverridden) return;
    window._fetchOverridden = true;
    
    window._originalFetch = window.fetch;
    window.fetch = function(...args) {
        const url = args[0]?.url || args[0] || '';
        return window._originalFetch.apply(this, args).then(response => {
            if (!response.ok) {
                console.log('Fetch错误调试:', response.status, url);
                if (url.includes('/auth/') && (response.status === 401 || response.status === 400)) {
                    console.log('认证请求失败（已过滤）:', response.status);
                } else if (!url.includes('talwindcss.com')) {
                    addError({
                        type: 'HTTP错误',
                        message: `HTTP ${response.status}: ${response.statusText}`,
                        source: url,
                        stack: '',
                        time: new Date().toLocaleString('zh-CN')
                    });
                }
            }
            return response;
        }).catch(error => {
            console.log('Fetch异常调试:', error.message, url);
            if (error.message && error.message.includes('Failed to fetch') && !url.includes('talwindcss.com')) {
                addError({
                    type: '网络请求异常',
                    message: error.message || String(error),
                    source: url,
                    stack: error.stack || '',
                    time: new Date().toLocaleString('zh-CN')
                });
            }
            throw error;
        });
    };
}

document.addEventListener('DOMContentLoaded', function() {
    applyConsoleOverrides();
    applyFetchOverride();
});

setInterval(function() {
    updateErrorDisplay();
    updateWarningDisplay();
}, 1000);
    </script>

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function hasConsecutiveChars(str, count) {
            for (let i = 0; i <= str.length - count; i++) {
                const substring = str.substring(i, i + count);
                const firstChar = substring[0];
                let allSame = true;
                for (let j = 1; j < count; j++) {
                    if (substring[j] !== firstChar) {
                        allSame = false;
                        break;
                    }
                }
                if (allSame) {
                    return true;
                }
            }
            return false;
        }

        function calculateTokenCount(str) {
            let chinese = 0;
            let letter = 0;
            let symbol = 0;

            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if (/[\u4e00-\u9fa5]/.test(char)) {
                    chinese++;
                } else if (/[a-zA-Z]/.test(char)) {
                    letter++;
                } else {
                    symbol++;
                }
            }

            const totalTokens = (chinese * 1) + (letter * 0.5) + (symbol * 1);
            return Math.ceil(totalTokens);
        }

        function showCharTip() {
            alert('字符计算逻辑：1个汉字=1字符，1个字母=0.5字符，1个符号=1字符，计算结果向上取整');
        }

        function updateCharCount(input) {
            const maxCount = 10;
            let currentValue = input.value;
            let currentCount = calculateTokenCount(currentValue);

            while (currentCount > maxCount && currentValue.length > 0) {
                currentValue = currentValue.slice(0, -1);
                currentCount = calculateTokenCount(currentValue);
            }

            if (input.value !== currentValue) {
                input.value = currentValue;
                showMessage('已达到输入上限', 'error');
            }

            const charCountEl = document.getElementById('charCount');
            if (charCountEl) {
                charCountEl.textContent = `${currentCount}/${maxCount}`;
            }
        }

        async function handleRegister() {
            if (!client) {

                return;
            }
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !email || !password) {
                showMessage('请填写所有字段', 'error');
                return;
            }

            if (username.length !== 10) {
                showMessage('用户名必须刚好10位', 'error');
                return;
            }

            if (!/^[a-zA-Z0-9]+$/.test(username)) {
                showMessage('用户名只能包含字母和数字', 'error');
                return;
            }

            if (hasConsecutiveChars(username, 4)) {
                showMessage('用户名不能包含连续4位及以上相同字符', 'error');
                return;
            }

            if (password.length < 1 || password.length > 30) {
                showMessage('密码长度必须在1-30位之间', 'error');
                return;
            }

            try {
                const { data: existingUser, error: checkError } = await client
                    .from('profiles')
                    .select('id')
                    .eq('username', username)
                    .single();

                if (!checkError && existingUser) {
                    showMessage('该用户名已被注册', 'error');
                    return;
                }

                const { data, error } = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });

                if (error) {
                    if (error.message && error.message.includes('already registered')) {
                        showMessage('该邮箱已被注册', 'error');
                    } else {
                        throw error;
                    }
                    return;
                }

                if (data.user) {
                    showMessage('注册成功！');
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    showLogin();
                } else {
                    showMessage('注册失败，请重试', 'error');
                }
            } catch (err) {
                console.error('注册失败:', err);
                if (err.message && err.message.includes('already registered')) {
                    showMessage('该邮箱已被注册', 'error');
                } else {
                    showMessage(err.message || '注册失败，请重试', 'error');
                }
            }
        }

        async function handleLogin() {

                    const { data: profiles, error: profileError } = await client
                        .from('profiles')
                        .select('id, email')

                        return;

                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('登录调试 - 返回结果:', { data, error });

                if (error) {
                    console.error('登录调试 - 错误详情:', error);
                    if (error.message.includes('Invalid login credentials')) {
                        showMessage('邮箱或密码错误', 'error');

                    return;
                }

                showMessage('登录成功！');
                updateUserInfo(data.user);

                console.error('登录失败（catch）:', err);
                if (err.message && typeof err.message === 'string') {
                    if (err.message.includes('Invalid login credentials')) {
                        showMessage('邮箱或密码错误', 'error');
                    } else if (err.message.includes('Email not confirmed')) {
                        showMessage('邮箱尚未验证', 'error');

                        showMessage('登录失败：' + err.message, 'error');
                    }
                } else {
                    showMessage('登录失败，请检查网络连接', 'error');
                }
            }
        }

                    return;

                const exactIdMatch = data.filter(u => u.id === keyword);
                const usernameMatch = data.filter(u => u.username && u.username.includes(keyword));
                const combined = [...exactIdMatch, ...usernameMatch.filter(u => !exactIdMatch.some(e => e.id === u.id))];

                if (combined.length === 0) {
                    resultBox.innerHTML = '<div class="search-no-result">没有找到用户</div>';

                        let btnHtml = '';

        // 发送好友申请
        async function sendFriendRequest(targetUserId, targetUsername) {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                return;
            }

            if (currentUser.id === targetUserId) {
                showMessage('不能添加自己为好友', 'error');
                return;
            }

            try {
                // 检查是否已经是好友
                const { data: existingFriend1 } = await client
                    .from('friends')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .eq('friend_id', targetUserId);
                
                const { data: existingFriend2 } = await client
                    .from('friends')
                    .select('id')
                    .eq('user_id', targetUserId)
                    .eq('friend_id', currentUser.id);
                
                const existingFriend = [...(existingFriend1 || []), ...(existingFriend2 || [])];

                if (existingFriend && existingFriend.length > 0) {
                    showMessage('已经是好友', 'error');
                    return;
                }

                // 检查是否已经发送过申请
                const { data: existingRequest } = await client
                    .from('friend_requests')
                    .select('id')
                    .eq('from_user_id', currentUser.id)
                    .eq('to_user_id', targetUserId)
                    .eq('status', 'pending');

                if (existingRequest && existingRequest.length > 0) {
                    showMessage('已经发送过好友申请', 'error');
                    return;
                }

                // 发送好友申请
                const { error } = await client
                    .from('friend_requests')
                    .insert([{
                        from_user_id: currentUser.id,
                        from_username: currentUser.username,
                        to_user_id: targetUserId,
                        to_username: targetUsername,
                        status: 'pending'
                    }]);

                if (error) {
                    throw error;
                }

                showMessage('好友申请已发送');
                document.getElementById('searchResult').classList.remove('show');
                document.getElementById('searchInput').value = '';
            } catch (err) {
                console.error('发送好友申请失败:', err);
                showMessage('发送好友申请失败', 'error');
            }
        }

                        friend_id: request.from_user_id,

                    }]);

                if (insertError1) {
                    throw insertError1;
                }

                const { error: insertError2 } = await client
                    .from('friends')
                    .insert([{
                        user_id: request.from_user_id,
                        user_username: request.from_username,
                        friend_id: currentUser.id,
                        friend_username: currentUser.username,
                        created_at: new Date().toISOString()
                    }]);

                if (insertError2) {
                    throw insertError2;
                }

                showMessage('已同意好友申请');
                await loadFriendRequests();
                await loadFriendList();
            } catch (err) {
                console.error('同意好友申请失败:', err);
                showMessage('同意好友申请失败', 'error');
            }
        }

        // 拒绝好友申请
        async function rejectFriendRequest(requestId) {
            if (!currentUser) return;

            try {
                const { error } = await client
                    .from('friend_requests')
                    .update({ status: 'rejected' })
                    .eq('id', requestId);

                if (error) {
                    throw error;
                }

                showMessage('已拒绝好友申请');
                await loadFriendRequests();
            } catch (err) {
                console.error('拒绝好友申请失败:', err);
                showMessage('拒绝好友申请失败', 'error');
            }
        }

        // 删除好友
        async function deleteFriend(friendId) {
            if (!currentUser) return;

            try {
                // 删除双向好友关系
                const { error: error1 } = await client
                    .from('friends')
                    .delete()
                    .eq('user_id', currentUser.id)
                    .eq('friend_id', friendId);
                
                if (error1) {
                    throw error1;
                }
                
                const { error } = await client
                    .from('friends')
                    .delete()
                    .eq('user_id', friendId)
                    .eq('friend_id', currentUser.id);

                if (error) {
                    throw error;
                }

                showMessage('已删除好友');
                await loadFriendList();
            } catch (err) {
                console.error('删除好友失败:', err);
                showMessage('删除好友失败', 'error');
            }
        }

        let realtimeSubscription = null;

        function subscribeRealtime() {
            if (!currentUser || realtimeSubscription) return;
            
            realtimeSubscription = client
                .channel('friend_requests')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'friend_requests',
                    filter: `to_user_id=eq.${currentUser.id}`
                }, async () => {
                    await loadFriendRequests();
                })
                .subscribe();
        }

        function unsubscribeRealtime() {
            if (realtimeSubscription) {
                client.removeChannel(realtimeSubscription);
                realtimeSubscription = null;
            }
        }

        async function checkLoginStatus() {
            if (!client) {
                showLogin();
                return;
            }
            
            const { data: { session } } = await client.auth.getSession();
            
            if (session?.user) {
                updateUserInfo(session.user);
                
                client.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_OUT' || !session) {
                        currentUser = null;
                        localStorage.removeItem('loggedInUser');
                        showLogin();
                    } else if (session?.user) {
                        updateUserInfo(session.user);
                    }
                });
            } else {
                localStorage.removeItem('loggedInUser');
                showLogin();
                
                client.auth.onAuthStateChange((event, session) => {
                    if (session?.user) {
                        updateUserInfo(session.user);
                    }
                });
            }
        }

        document.addEventListener('click', function(e) {
            const searchBox = document.querySelector('.search-box');
            const searchResult = document.getElementById('searchResult');
            if (!searchBox.contains(e.target)) {
                searchResult.classList.remove('show');
            }
        });
    </script>
</body>
